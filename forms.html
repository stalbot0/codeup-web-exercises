<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device=width, initial-scale=1.0">
    <meta name="description" content="Registration page for Veridian Dynamics">
    <meta name="keywords" content="HTML">
    <meta name="author" content="Stephen Talbot">
    <title>Register With Us</title>
</head>
<body>
<main>
    <form method="GET" action="https://request-inspector.glitch.me/">
        <label for="email">Email</label>
        <input id="email" name="email" type="text" placeholder="Enter your email">
        <br>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password">
        <br>
        <input type="submit">
        <br>
        <br>
        <label for="Bio">Input a short description of yourself below.</label>
        <br>
        <textarea id="Bio" name="Bio"></textarea>
        <br>
        <button type="submit">Submit Your Bio</button>
    </form>
</main>

</body>
</html>
